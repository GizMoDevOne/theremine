<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffd9a0"/>
      <stop offset="45%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff6b1a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0a0705"/>
  <!-- champ : arcs cyan concentriques (le contrôle) -->
  <g fill="none" stroke="#7ce3ff" stroke-width="1.3" opacity="0.85">
    <path d="M6 21 a10 10 0 0 1 20 0"/>
    <path d="M9.5 21 a6.5 6.5 0 0 1 13 0" opacity="0.6"/>
  </g>
  <!-- antenne -->
  <line x1="16" y1="19" x2="16" y2="6" stroke="#ffb347" stroke-width="2" stroke-linecap="round"/>
  <!-- halo ambre au sommet de l'antenne (le son) -->
  <circle cx="16" cy="6" r="6" fill="url(#glow)"/>
  <circle cx="16" cy="6" r="2.1" fill="#fff0d9"/>
  <!-- socle -->
  <circle cx="16" cy="22.5" r="2.4" fill="none" stroke="#b6a48f" stroke-width="1.4"/>
</svg>
